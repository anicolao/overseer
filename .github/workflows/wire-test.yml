name: Overseer Nix Wire-Test

on:
  push:
    branches: [ remediation/mvp-improvements-4 ]
  workflow_dispatch:

jobs:
  wire-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Wire-Test
        run: nix develop --command npx tsx src/wire_test.ts
