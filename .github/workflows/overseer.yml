name: Overseer Agent Dispatcher

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  overseer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Ignorable Comment Sentinels
        id: backstop_guard
        run: |
          skip_workflow=false
          if [ "${GITHUB_EVENT_NAME}" = "issue_comment" ]; then
            comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
            if printf '%s' "$comment_body" | grep -Fq '<!-- overseer:persistence-backstop -->'; then
              skip_workflow=true
              echo "Skipping workflow because it was triggered by a persistence backstop comment."
            elif printf '%s' "$comment_body" | grep -Fq '<!-- overseer:status-update -->'; then
              skip_workflow=true
              echo "Skipping workflow because it was triggered by a bot status update comment."
            fi
          fi
          echo "skip_workflow=${skip_workflow}" >> "$GITHUB_OUTPUT"

      - name: Prepare Issue Branch
        id: issue_branch
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        run: |
          prepared=false
          issue_number="$(jq -r '.issue.number // empty' "$GITHUB_EVENT_PATH")"
          if [ -n "$issue_number" ]; then
            target_branch="bot/issue-${issue_number}"
            git fetch origin "$target_branch" || true
            if git show-ref --verify --quiet "refs/remotes/origin/${target_branch}"; then
              git checkout -B "$target_branch" "origin/$target_branch"
              echo "created=false" >> "$GITHUB_OUTPUT"
            else
              git checkout -B "$target_branch" "origin/main"
              git push -u origin "$target_branch"
              echo "created=true" >> "$GITHUB_OUTPUT"
            fi
            echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
            echo "target_branch=${target_branch}" >> "$GITHUB_OUTPUT"
            prepared=true
          fi
          echo "prepared=${prepared}" >> "$GITHUB_OUTPUT"

      - name: Record Initial Git State
        id: git_state
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        run: echo "initial_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Magic Nix Cache
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Setup Node.js
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git Identity
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        run: |
          git config --global user.name "Overseer Bot"
          git config --global user.email "overseer-bot@users.noreply.github.com"

      - name: Install Dependencies
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        run: npm install

      - name: Run Overseer Dispatcher
        id: dispatcher
        if: steps.backstop_guard.outputs.skip_workflow != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OVERSEER_TOKEN || secrets.GITHUB_TOKEN }}
          TRACE_JSONL_PATH: trace_${{ github.run_id }}.jsonl
          TASK_PERSONA_BACKEND: gemini_cli
          TASK_PERSONA_CLI_BOTS: product-architect,planner,developer-tester,quality
        run: nix develop --command npx tsx src/dispatch.ts

      - name: Persistence Backstop
        id: persistence_backstop
        if: always() && steps.backstop_guard.outputs.skip_workflow != 'true' && steps.dispatcher.outputs.persona_executed == 'true'
        env:
          INITIAL_SHA: ${{ steps.git_state.outputs.initial_sha }}
        run: bash .github/scripts/persistence_backstop.sh

      - name: Upload Persistence Backstop Artifacts
        if: always() && steps.persistence_backstop.outputs.triggered == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: persistence-backstop-${{ github.run_id }}
          path: ${{ steps.persistence_backstop.outputs.artifact_dir }}
          retention-days: 7

      - name: Comment Persistence Backstop
        if: always() && steps.persistence_backstop.outputs.triggered == 'true'
        env:
          GH_TOKEN: ${{ secrets.OVERSEER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.persistence_backstop.outputs.issue_number }}" \
            --body-file "${{ steps.persistence_backstop.outputs.comment_path }}"

      - name: Upload Session Logs
        if: always() && steps.backstop_guard.outputs.skip_workflow != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agent-session-logs-${{ github.run_id }}
          path: session_*.log
          retention-days: 7

      - name: Upload Trace JSONL
        if: always() && steps.backstop_guard.outputs.skip_workflow != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trace-jsonl-${{ github.run_id }}
          path: trace_*.jsonl
          retention-days: 7
          if-no-files-found: warn
